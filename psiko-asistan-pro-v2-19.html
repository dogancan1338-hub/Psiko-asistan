<body onClick="window.closeAllMenus && window.closeAllMenus()">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const C={bg:"#0f1117",surface:"#161b27",border:"#2a3450",accent:"#4f8ef7",teal:"#2dd4bf",rose:"#f43f5e",violet:"#8b5cf6",textMuted:"#7c8db5", gray: "#94a3b8"};

        // Gemini API key - localStorage'dan oku
        const getGeminiKey = () => localStorage.getItem("psiko_gemini_key") || "";
        const GEMINI_API_KEY = getGeminiKey();

        const callGeminiAPI = async (prompt) => {
            const apiKey = localStorage.getItem("psiko_gemini_key");
            if (!apiKey) {
                const key = window.prompt("Gemini API Key giriniz:\n\n(aistudio.google.com adresinden alabilirsiniz)");
                if (key && key.trim()) {
                    localStorage.setItem("psiko_gemini_key", key.trim());
                } else {
                    throw new Error("API Key girilmedi.");
                }
            }
            const currentKey = localStorage.getItem("psiko_gemini_key");
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                }
            );
            const data = await response.json();
            if (data.error) throw new Error("Gemini hatası: " + data.error.message);
            if (!data.candidates || !data.candidates[0]) throw new Error("Boş yanıt: " + JSON.stringify(data));
            return data.candidates[0].content.parts[0].text;
        };
        
        const dbPut = async (store, key, val) => {
            if (!window.fbDB) return;
            try {
                let saveVal = val;
                if (store === "materyaller" && key === "kutuphane" && val && typeof val === "object") {
                    saveVal = {};
                    Object.keys(val).forEach(cat => {
                        saveVal[cat] = (val[cat] || []).map(f => {
                            const { data, ...rest } = f;
                            return rest;
                        });
                    });
                }
                await window.fbSet(window.fbRef(window.fbDB, `${store}/${key}`), saveVal);
            } catch (e) { console.error("FB Put Error", e); }
        };

        const dbGet = async (store, key, defaultVal) => {
            if (!window.fbDB) return defaultVal;
            try {
                const snapshot = await window.fbGet(window.fbChild(window.fbRef(window.fbDB), `${store}/${key}`));
                return snapshot.exists() ? snapshot.val() : defaultVal;
            } catch (e) { 
                console.error("FB Get Error", e);
                return defaultVal; 
            }
        };

        function App() {
            const [isLoading, setIsLoading] = useState(true);
            const [screen, setScreen] = useState("dashboard");
            const [selectedClientId, setSelectedClientId] = useState(null); 
            const [searchTerm, setSearchTerm] = useState("");
            const [isRecording, setIsRecording] = useState(false);
            const [tempNote, setTempNote] = useState("");
            const [showPlanModal, setShowPlanModal] = useState(false);
            const [showAddClientModal, setShowAddClientModal] = useState(false);
            const [showManualAddTrainingModal, setShowManualAddTrainingModal] = useState(false); 
            const [showClaudeAddTrainingModal, setShowClaudeAddTrainingModal] = useState(false); 
            const [showAepModal, setShowAepModal] = useState(false);

            const exportAIAnalysisPPT = () => {

                const sections = [
                    { heading: "Danışan Profili", text: `${activeClient.name} | ${activeClient.tag}\nGenel Durum: ${aiAnalysis.danisanProfili?.genelDurum||"-"}` },

            const handleSaveSession = (clientId) => {

            };

            const handleFileUpload = (e, targetStore) => {
                const file = e.target.files[0];
                const storeKey = targetStore || selectedMaterialPage;
                if (!file || !storeKey) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const newFile = { id: Date.now(), name: file.name, size: (file.size / 1024 / 1024).toFixed(2) + " MB", date: new Date().toLocaleDateString('tr-TR'), type: file.type, data: event.target.result };
                    setMaterialFiles(prev => ({ ...prev, [storeKey]: [newFile, ...prev[storeKey]] }));
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            };

            const handleSaveWritingNote = () => {
                if(!writingNoteContent.trim()) return;
                let encodedData;
                try {
                    encodedData = "data:text/plain;base64," + btoa(unescape(encodeURIComponent(writingNoteContent)));
                } catch(e) {
                    encodedData = "data:text/plain;charset=utf-8," + encodeURIComponent(writingNoteContent);
                }
                const newNote = { id: Date.now(), name: writingNoteContent.substring(0, 30) + (writingNoteContent.length > 30 ? "..." : ""), content: writingNoteContent, date: new Date().toLocaleDateString('tr-TR'), size: "Metin Notu", type: "text/plain", data: encodedData };
                setMaterialFiles(prev => ({ ...prev, [selectedWritingCategory]: [newNote, ...prev[selectedWritingCategory]] }));
                setWritingNoteContent(""); setShowWritingNoteModal(false);
            };

            const openFile = (file) => {
                if(file.type === "text/plain" && file.content) { alert("Not İçeriği:\n\n" + file.content); return; }
                const blob = dataURLtoBlob(file.data);
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                setTimeout(() => URL.revokeObjectURL(url), 10000); 
            };

            const downloadFile = (file) => { const blob = dataURLtoBlob(file.data); saveAs(blob, file.name); };

            const dataURLtoBlob = (dataurl) => {
                let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
                while(n--){ u8arr[n] = bstr.charCodeAt(n); }
                return new Blob([u8arr], {type:mime});
            };

            const deleteFile = (category, fileId) => {
                if(confirm("Bu dosyayı kalıcı olarak silmek istediğinize emin misiniz?")) {

            const handleSaveAepData = async () => {
                const updatedData = { egitimToplam: aepData.egitimToplam + (parseInt(aepInput.egitim) || 0), katilimciToplam: aepData.katilimciToplam + (parseInt(aepInput.katilimci) || 0) };

            };

            const handleSaveEoeData = async () => {

                setEoeData(updatedData); await dbPut("veriler", "eoe_stats", updatedData);
                setEoeInput({ eoeSayi: "", eoeKatilimci: "" }); setShowEoeModal(false);
            };

            const handleSaveDanismanlikData = async () => {
                const updatedData = { bosanma: danismanlikData.bosanma + (parseInt(danismanlikInput.bosanma) || 0), aile: danismanlikData.aile + (parseInt(danismanlikInput.aile) || 0), bireysel: danismanlikData.bireysel + (parseInt(danismanlikInput.bireysel) || 0) };

            };

            const handleSaveModularAepData = async () => {
                const updatedData = { egitimToplam: modularAepData.egitimToplam + (parseInt(modularAepInput.egitim) || 0), katilimciToplam: modularAepData.katilimciToplam + (parseInt(modularAepInput.katilimci) || 0) };
                setModularAepData(updatedData); await dbPut("veriler", "modular_aep_stats", updatedData);
                setModularAepInput({ egitim: "", katilimci: "" }); setShowModularAepModal(false);
            };

            const activeClient = clients.find(c => c.id === selectedClientId);

            const handleSaveCalendarNote = () => {
                const updatedNotes = { ...calendarNotes, [selectedCalendarDate]: currentCalendarNote };
                setCalendarNotes(updatedNotes); dbPut("notlar", "takvim_notlari", updatedNotes); setSelectedCalendarDate(null);
            };

            const handleDayClick = (d) => {
                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                setSelectedCalendarDate(dateStr); setCurrentCalendarNote(calendarNotes[dateStr] || "");
            };

            const renderCalendar = () => {
                const now = new Date();
                const month = now.getMonth(); const year = now.getFullYear();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const today = now.getDate();
                const cells = [];
                for(let i=0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) cells.push(<div key={`empty-${i}`} className="calendar-cell"></div>);
                for(let d=1; d <= daysInMonth; d++) {
                    const isToday = d === today;
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const hasEvent = clients.some(c => c.upcoming?.date === dateStr);
                    const hasNote = !!calendarNotes[dateStr];
                    cells.push(<div key={d} onClick={() => handleDayClick(d)} className={`calendar-cell ${isToday ? 'active' : ''} ${hasEvent ? 'has-event' : ''} ${hasNote ? 'has-note' : ''}`}>{d}</div>);

                return cells;
            };

            if (isLoading) {
                return (
                    <div style={{ height:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#0b0e18", position:"relative", overflow:"hidden", fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
                        <style>{`

                            <div style={{ position:"absolute", inset:10, borderRadius:"50%", border:"1px solid transparent", borderTopColor:"#8b5cf6", borderLeftColor:"rgba(139,92,246,0.25)", animation:"spinRingRev 1.8s cubic-bezier(0.4,0,0.2,1) infinite" }}/>
                            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                                <span style={{ fontSize:20, fontWeight:900, letterSpacing:"-0.5px", background:"linear-gradient(135deg,#4f8ef7,#8b5cf6)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>DA</span>
                            </div>
                        </div>
                        <div style={{ fontSize:15, fontWeight:700, letterSpacing:"4px", textTransform:"uppercase", background:"linear-gradient(90deg,#4a5568 20%,#e8eaf0 50%,#4a5568 80%)", backgroundSize:"200% auto", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", animation:"shimmerLoad 2.8s linear infinite, fadeInUp 0.6s ease both", marginBottom:8 }}>Psiko-Asistan Pro</div>

                        <div style={{ display:"flex", gap:6, animation:"fadeInUp 0.6s ease both", animationDelay:"0.35s" }}>
                            {[0,0.2,0.4].map((d,i) => <div key={i} style={{ width:5, height:5, borderRadius:"50%", background:"#4f8ef7", animation:`blinkDot 1.4s ease-in-out ${d}s infinite` }}/>)}
                        </div>
                    </div>
                );
            }

            return (
                <div style={{minHeight:"100vh"}}>
                    {contextMenu && (<div className="context-menu" style={{ top: contextMenu.y, left: contextMenu.x }}><div className="context-menu-item" onClick={() => deleteClient(contextMenu.clientId)}>🗑️ Danışanı Sil</div></div>)}
                    {selectedCalendarDate && (<div className="modal-overlay"><div className="plan-modal" style={{borderColor: C.teal}}><h3 style={{marginTop:0, color:C.teal}}>📝 Günlük Not: {selectedCalendarDate}</h3><textarea value={currentCalendarNote} onChange={(e) => setCurrentCalendarNote(e.target.value)} placeholder="Bu güne özel notunuzu buraya yazın..." style={{height:150, marginTop:10}} /><div style={{display:"flex", gap:10, marginTop:20}}><button className="btn" style={{flex:1, background:C.border}} onClick={() => setSelectedCalendarDate(null)}>Kapat</button><button className="btn btn-teal" style={{flex:2}} onClick={handleSaveCalendarNote}>Notu Kaydet</button></div></div></div>)}
                    {screen === "dashboard" && (<div style={{paddingBottom: 120}}><div style={{padding:"40px 8%", background:`linear-gradient(160deg,#1a2240 0%,${C.bg} 100%)`, borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center"}}><div><div style={{fontSize:16, color:C.textMuted, marginBottom:5}}>Hoş geldin,</div><div style={{fontSize:36, fontWeight:800}}>Psk.Danışman Doğan Aşkın</div></div><div style={{display:"flex", alignItems:"center", gap:12}}>
                    <button onClick={() => {
                        const mevcut = localStorage.getItem("psiko_gemini_key") || "";
                        const yeni = window.prompt("Gemini API Key:\n(aistudio.google.com > Get API Key)\n\nMevcut: " + (mevcut ? mevcut.substring(0,8)+"..." : "Yok"));
                        if(yeni && yeni.trim()) { localStorage.setItem("psiko_gemini_key", yeni.trim()); alert("✅ API Key kaydedildi!"); }
                    }} style={{background:"none", border:`1px solid ${C.border}`, color:C.textMuted, padding:"8px 12px", borderRadius:10, cursor:"pointer", fontSize:12}}>🔑 API Key</button>
                    <div style={{width:60, height:60, borderRadius:15, background:`linear-gradient(135deg,${C.accent},${C.violet})`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:22}}>DA</div>

    <script>
        function apiKeyAyarla() {
            const mevcut = localStorage.getItem("psiko_gemini_key") || "";
            const yeni = prompt("Gemini API Key giriniz:\n(aistudio.google.com > Get API Key)\n\nMevcut key: " + (mevcut ? mevcut.substring(0,8) + "..." : "Yok"));
            if (yeni && yeni.trim()) {
                localStorage.setItem("psiko_gemini_key", yeni.trim());
                alert("✅ API Key kaydedildi!");
            }
        }

        async function sifreyiKontrolEt() {
            const girilen = document.getElementById('sifre-input').value;
            const hata    = document.getElementById('hata-mesaji');
            if (!girilen) return;

            const waitFB = () => new Promise(resolve => {
                if (window.fbDB) return resolve();
                const t = setInterval(() => { if(window.fbDB){ clearInterval(t); resolve(); } }, 100);
            });
            await waitFB();

            try {
                const snap = await window.fbGet(window.fbRef(window.fbDB, 'girisSifresi'));
                if (snap.exists() && String(snap.val()) === girilen) {
                    document.getElementById('kilit-ekrani').style.opacity = '0';
                    document.getElementById('kilit-ekrani').style.transition = 'opacity 0.5s ease';
                    setTimeout(() => document.getElementById('kilit-ekrani').style.display = 'none', 500);
                } else {
                    hata.style.display = 'block';
                    document.getElementById('sifre-input').style.borderColor = 'rgba(224,58,90,0.5)';
                    setTimeout(() => {
                        hata.style.display = 'none';
                        document.getElementById('sifre-input').style.borderColor = 'rgba(46,196,182,0.25)';
                    }, 2500);
                }
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
